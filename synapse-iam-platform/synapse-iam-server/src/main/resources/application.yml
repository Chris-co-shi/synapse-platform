spring:
  application:
    name: synapse-iam-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: ${NACOS_GROUP:SYNAPSE_PLATFORM_DEV}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: ${NACOS_GROUP:SYNAPSE_PLATFORM_DEV}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        file-extension: yml

server:
  port: ${SERVER_PORT:8100}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

synapse:
  security:
    resource-server:
      enabled: false
      issuer-uri: http://127.0.0.1:8100
      jwk-set-uri: http://127.0.0.1:8100/oauth2/jwks
      audiences:
        - synapse-platform
      denylist-enabled: false
      permit-paths:
        - /actuator/health
        - /actuator/health/**
        - /actuator/info
        - /error
        - /auth/login
        - /auth/refresh
        - /oauth2/jwks
    gateway-proof:
      enabled: ${IAM_GATEWAY_PROOF_ENABLED:true}
      required: true
      gateway-id: ${IAM_TRUSTED_GATEWAY_ID:synapse-gateway:synapse-iam-server}
      secret: ${GATEWAY_PROOF_SECRET:}
      replay-protection-enabled: ${IAM_GATEWAY_PROOF_REPLAY_ENABLED:true}
      permit-paths:
        - /actuator/health
        - /actuator/health/
        - /actuator/info
        - /error
        - /auth/login
        - /auth/refresh
  time:
    default-zone: UTC
  iam:
    auth:
      issuer: ${IAM_ISSUER_URI:http://127.0.0.1:8100}
      audiences:
        - ${SYNAPSE_PLATFORM_AUDIENCE:synapse-platform}
      client-id: ${SYNAPSE_CONSOLE_CLIENT_ID:synapse-console}
      access-token-ttl: ${IAM_ACCESS_TOKEN_TTL:15m}
      refresh-token-idle-ttl: ${IAM_REFRESH_TOKEN_IDLE_TTL:7d}
      refresh-token-absolute-ttl: ${IAM_REFRESH_TOKEN_ABSOLUTE_TTL:30d}
