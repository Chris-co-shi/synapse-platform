name: Gateway P0 Security

on:
  push:
    branches:
      - main
      - codex/gateway-p0-security-closure
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  gateway-p0-security:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      gateway-failure-summary: ${{ steps.gateway-verify.outputs.failure-summary }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21 and Maven repository credentials
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Show build environment
        run: |
          java -version
          mvn -version
          mkdir -p .ci-logs

      - name: Verify Gateway reactor slice
        id: gateway-verify
        shell: bash
        run: |
          set +e
          mvn -B -ntp -pl synapse-gateway-platform -am clean verify \
            > .ci-logs/gateway-verify.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            grep -E '^\[ERROR\]|Rule [0-9]+:|Failed to execute goal' \
              .ci-logs/gateway-verify.log | tail -n 30 \
              | base64 --wrap=0 > .ci-logs/gateway-failure-summary.b64 || true
            echo "failure-summary=$(cat .ci-logs/gateway-failure-summary.b64)" >> "$GITHUB_OUTPUT"
            tail -n 80 .ci-logs/gateway-verify.log
            exit "$status"
          fi
          tail -n 20 .ci-logs/gateway-verify.log

      - name: Verify Resource security slice with mandatory Redis container
        shell: bash
        run: |
          set -o pipefail
          mvn -B -ntp -Dsynapse.test.redis.required=true \
            -pl synapse-resource-platform/synapse-resource-server -am clean verify 2>&1 \
            | tee .ci-logs/resource-verify.log

      - name: Inspect Gateway dependency tree
        shell: bash
        run: |
          set -o pipefail
          mvn -B -ntp -pl synapse-gateway-platform dependency:tree \
            -DoutputFile=target/gateway-dependency-tree.txt 2>&1 \
            | tee .ci-logs/dependency-tree-command.log
          cp synapse-gateway-platform/target/gateway-dependency-tree.txt \
            .ci-logs/gateway-dependency-tree.txt
          cat .ci-logs/gateway-dependency-tree.txt
          if grep -E \
            'spring-boot-starter-web:|spring-boot-starter-jdbc:|spring-webmvc:|spring-jdbc:|mybatis|druid|com.indigo.synapse:synapse-data:|com.indigo.synapse:synapse-mybatis-plus:|com.indigo.synapse:synapse-datasource:|com.indigo.synapse.platform:.*-server:' \
            .ci-logs/gateway-dependency-tree.txt; then
            echo 'Forbidden Gateway dependency detected.' >&2
            exit 1
          fi

      - name: Verify full reactor
        shell: bash
        run: |
          set -o pipefail
          mvn -B -ntp -Dsynapse.test.redis.required=true clean verify 2>&1 \
            | tee .ci-logs/full-reactor-verify.log

      - name: Check patch whitespace
        run: git diff --check origin/main...HEAD

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-p0-verification-logs
          path: .ci-logs
          if-no-files-found: error

  gateway-failure-diagnostic:
    needs: gateway-p0-security
    if: always() && needs.gateway-p0-security.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Print concise Gateway failure
        env:
          FAILURE_SUMMARY: ${{ needs.gateway-p0-security.outputs.gateway-failure-summary }}
        run: |
          if [ -n "$FAILURE_SUMMARY" ]; then
            echo "$FAILURE_SUMMARY" | base64 --decode
          else
            echo 'Gateway failure summary was not produced.'
          fi
