name: Gateway P0 Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  gateway:
    name: Gateway reactor slice
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - name: Verify Gateway
        shell: bash
        run: |
          set +e
          mkdir -p ci-logs
          mvn -B -ntp -pl synapse-gateway-platform -am clean verify > ci-logs/gateway.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            grep -E '^\[ERROR\]|Rule [0-9]+:|Failed to execute goal|Tests run:|Caused by:' ci-logs/gateway.log | tail -n 80 || true
            tail -n 120 ci-logs/gateway.log
          else
            tail -n 30 ci-logs/gateway.log
          fi
          exit "$status"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-verify-log
          path: ci-logs
          if-no-files-found: error

  resource:
    name: Resource security with Redis
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - name: Verify Resource and mandatory Testcontainers Redis
        shell: bash
        run: |
          set +e
          mkdir -p ci-logs
          mvn -B -ntp -Dsynapse.test.redis.required=true \
            -pl synapse-resource-platform/synapse-resource-server -am clean verify \
            > ci-logs/resource.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            grep -E '^\[ERROR\]|Rule [0-9]+:|Failed to execute goal|Tests run:|Caused by:' ci-logs/resource.log | tail -n 100 || true
            tail -n 160 ci-logs/resource.log
          else
            tail -n 30 ci-logs/resource.log
          fi
          exit "$status"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resource-verify-log
          path: ci-logs
          if-no-files-found: error

  dependency-tree:
    name: Gateway dependency boundary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - name: Inspect dependency tree
        shell: bash
        run: |
          mkdir -p ci-logs
          mvn -B -ntp -pl synapse-gateway-platform dependency:tree \
            -DoutputFile=target/gateway-dependency-tree.txt
          cp synapse-gateway-platform/target/gateway-dependency-tree.txt ci-logs/gateway-dependency-tree.txt
          cat ci-logs/gateway-dependency-tree.txt
          if grep -E \
            'spring-boot-starter-web:|spring-boot-starter-jdbc:|spring-webmvc:|spring-jdbc:|mybatis|druid|com.indigo.synapse:synapse-data:|com.indigo.synapse:synapse-mybatis-plus:|com.indigo.synapse:synapse-datasource:|com.indigo.synapse.platform:.*-server:' \
            ci-logs/gateway-dependency-tree.txt; then
            echo 'Forbidden Gateway dependency detected.' >&2
            exit 1
          fi
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-dependency-tree
          path: ci-logs
          if-no-files-found: error

  full-reactor:
    name: Full reactor
    needs:
      - gateway
      - resource
      - dependency-tree
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - name: Verify full reactor
        shell: bash
        run: |
          set +e
          mkdir -p ci-logs
          mvn -B -ntp -Dsynapse.test.redis.required=true clean verify > ci-logs/full-reactor.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            grep -E '^\[ERROR\]|Rule [0-9]+:|Failed to execute goal|Tests run:|Caused by:' ci-logs/full-reactor.log | tail -n 100 || true
            tail -n 160 ci-logs/full-reactor.log
          else
            tail -n 40 ci-logs/full-reactor.log
          fi
          exit "$status"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-reactor-verify-log
          path: ci-logs
          if-no-files-found: error

  whitespace:
    name: Git diff whitespace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git diff --check origin/main...HEAD
