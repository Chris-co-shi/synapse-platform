name: Codex Source Export

on:
  push:
    branches:
      - codex/gateway-p0-security-closure

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create source archive
        run: zip -qr synapse-platform-source.zip . -x '.git/*' 'target/*' '*/target/*'
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: synapse-platform-source
          path: synapse-platform-source.zip
          if-no-files-found: error
