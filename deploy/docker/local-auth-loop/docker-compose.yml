name: synapse-auth-loop

services:
  postgres:
    image: "${POSTGRES_IMAGE:-postgres:17}"
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-synapse_iam}"
      POSTGRES_USER: "${POSTGRES_USER:-synapse_iam}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      TZ: "${TZ:-UTC}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - synapse-auth-loop

  redis:
    image: "${REDIS_IMAGE:-redis:7.4}"
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - synapse-auth-loop

  nacos:
    image: "${NACOS_IMAGE:-nacos/nacos-server:v3.0.3}"
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_TOKEN: "${NACOS_AUTH_TOKEN:?NACOS_AUTH_TOKEN is required}"
      NACOS_AUTH_IDENTITY_KEY: "${NACOS_AUTH_IDENTITY_KEY:?NACOS_AUTH_IDENTITY_KEY is required}"
      NACOS_AUTH_IDENTITY_VALUE: "${NACOS_AUTH_IDENTITY_VALUE:?NACOS_AUTH_IDENTITY_VALUE is required}"
      TZ: "${TZ:-UTC}"
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent --show-error --max-time 4 "http://127.0.0.1:8848/nacos" >/dev/null
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - synapse-auth-loop

  iam:
    build:
      context: ../../../synapse-iam-platform/synapse-iam-server
      dockerfile: Dockerfile
      args:
        JAR_FILE: target/synapse-iam-server-0.1.0-SNAPSHOT.jar
        BUILD_VERSION: local-auth-loop
    image: synapse/iam-server:local-auth-loop
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-dev}"
      SERVER_PORT: "${IAM_SERVER_PORT:-8100}"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: "${POSTGRES_DB:-synapse_iam}"
      DB_USERNAME: "${POSTGRES_USER:-synapse_iam}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      NACOS_SERVER_ADDR: "${NACOS_SERVER_ADDR:-nacos:8848}"
      NACOS_NAMESPACE: "${NACOS_NAMESPACE:-}"
      NACOS_GROUP: "${NACOS_GROUP:-SYNAPSE_PLATFORM_DEV}"
      NACOS_USERNAME: "${NACOS_USERNAME:-}"
      NACOS_PASSWORD: "${NACOS_PASSWORD:-}"
      IAM_ISSUER_URI: "${IAM_ISSUER_URI:-http://iam:8100}"
      IAM_JWK_SET_URI: "${IAM_JWK_SET_URI:-http://iam:8100/oauth2/jwks}"
      SYNAPSE_PLATFORM_AUDIENCE: "${SYNAPSE_PLATFORM_AUDIENCE:-synapse-platform}"
      SYNAPSE_CONSOLE_CLIENT_ID: "${SYNAPSE_CONSOLE_CLIENT_ID:-synapse-console}"
      IAM_GATEWAY_PROOF_ENABLED: "${IAM_GATEWAY_PROOF_ENABLED:-true}"
      IAM_GATEWAY_PROOF_REPLAY_ENABLED: "${IAM_GATEWAY_PROOF_REPLAY_ENABLED:-true}"
      IAM_TRUSTED_GATEWAY_ID: "${GATEWAY_ID:-synapse-gateway}:synapse-iam-server"
      GATEWAY_PROOF_SECRET: "${GATEWAY_PROOF_SECRET:?GATEWAY_PROOF_SECRET is required}"
      IAM_BOOTSTRAP_ENABLED: "${IAM_BOOTSTRAP_ENABLED:-true}"
      IAM_BOOTSTRAP_USERNAME: "${IAM_BOOTSTRAP_USERNAME:?IAM_BOOTSTRAP_USERNAME is required}"
      IAM_BOOTSTRAP_PASSWORD: "${IAM_BOOTSTRAP_PASSWORD:?IAM_BOOTSTRAP_PASSWORD is required}"
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
      TZ: "${TZ:-UTC}"
    ports:
      - "${IAM_HOST_PORT:-8100}:${IAM_SERVER_PORT:-8100}"
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent --show-error --max-time 4 "http://127.0.0.1:$${SERVER_PORT}/actuator/health" >/dev/null
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks:
      - synapse-auth-loop

  gateway:
    build:
      context: ../../../synapse-gateway-platform
      dockerfile: Dockerfile
      args:
        JAR_FILE: target/synapse-gateway-platform-0.1.0-SNAPSHOT.jar
        BUILD_VERSION: local-auth-loop
    image: synapse/gateway-platform:local-auth-loop
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      iam:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-dev}"
      SERVER_PORT: "${GATEWAY_SERVER_PORT:-8080}"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      NACOS_SERVER_ADDR: "${NACOS_SERVER_ADDR:-nacos:8848}"
      NACOS_NAMESPACE: "${NACOS_NAMESPACE:-}"
      NACOS_GROUP: "${NACOS_GROUP:-SYNAPSE_PLATFORM_DEV}"
      NACOS_USERNAME: "${NACOS_USERNAME:-}"
      NACOS_PASSWORD: "${NACOS_PASSWORD:-}"
      IAM_ISSUER_URI: "${IAM_ISSUER_URI:-http://iam:8100}"
      IAM_JWK_SET_URI: "${IAM_JWK_SET_URI:-http://iam:8100/oauth2/jwks}"
      SYNAPSE_GATEWAY_AUDIENCE: "${SYNAPSE_GATEWAY_AUDIENCE:-synapse-platform}"
      SYNAPSE_PLATFORM_AUDIENCE: "${SYNAPSE_PLATFORM_AUDIENCE:-synapse-platform}"
      GATEWAY_PROOF_ENABLED: "${GATEWAY_PROOF_ENABLED:-true}"
      GATEWAY_ID: "${GATEWAY_ID:-synapse-gateway}"
      GATEWAY_PROOF_SECRET: "${GATEWAY_PROOF_SECRET:?GATEWAY_PROOF_SECRET is required}"
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
      TZ: "${TZ:-UTC}"
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:${GATEWAY_SERVER_PORT:-8080}"
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent --show-error --max-time 4 "http://127.0.0.1:$${SERVER_PORT}/actuator/health" >/dev/null
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks:
      - synapse-auth-loop

volumes:
  postgres-data:
  redis-data:

networks:
  synapse-auth-loop:
    name: "${SYNAPSE_DOCKER_NETWORK:-synapse-auth-loop}"
    driver: bridge
